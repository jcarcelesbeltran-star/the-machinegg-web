<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The MachinEGG</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script> -->
</head>

<body>
    <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #629c1d; z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column;">
        <h1 style="color: white; font-family: 'Press Start 2P', monospace; font-size: 28px; text-shadow: 2px 2px 0 #333; margin-bottom: 20px;">LOADING...</h1>
        <p style="color: white; font-family: 'Press Start 2P', monospace; font-size: 10px; opacity: 0.8;">Starting Farm</p>
    </div>
    <div id="game-container">
        <!-- TOP BAR -->
        <header id="topbar">
            <h1>The MachinEGG</h1>
            <div id="stats-header" class="stats">
                <p style="display:flex; align-items:center;">
                    <canvas id="ui-chicken-icon" width="40" height="40" style="display:block; flex-shrink:0; margin-right:4px; margin-top:-8px; margin-bottom:-8px;"></canvas>
                    <span id="chickens">0</span>
                </p>
            </div>
            <div class="stats">
                <p>Money: <span id="money">0</span>$</p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="wipe-btn" class="pixel-btn" style="background: #e74c3c; color: white;">WIPE SAVE</button>
            </div>
        </header>

        <main>
            <div id="farm-area" style="position: relative;">
                <canvas id="gameCanvas" width="800" height="650"></canvas>
                <a id="rate-link" href="https://quantumgames-studio.itch.io/the-machinegg/rate?source=game" target="_blank" style="display: none; position: absolute; left: 50%; top: 50%; transform: translate(-50%, 250px); background: #e91e63; color: white; padding: 12px 24px; font-family: 'Press Start 2P', monospace; font-size: 14px; text-decoration: none; border: 4px solid #fff; border-radius: 8px; box-shadow: 0 4px 0 #88113a; z-index: 1000; transition: transform 0.1s, box-shadow 0.1s;" onmouseover="this.style.transform='translate(-50%, 252px)'; this.style.boxShadow='0 2px 0 #88113a';" onmouseout="this.style.transform='translate(-50%, 250px)'; this.style.boxShadow='0 4px 0 #88113a';">RATE THE GAME!</a>
            </div>

            <aside id="shop">
                <div id="shop-header" style="flex-shrink: 0; display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 12px; border-bottom: 2px dashed #8d6e63; padding-bottom: 10px;">
                    <h2 style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">Shop</h2>
                    <button id="mute-btn" class="pixel-btn" style="position: absolute; left: 0; padding: 2px; font-size: 12px; border-radius: 50%; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; border-width: 2px;" title="Toggle Music">🎵</button>
                    <button id="toggle-info-btn" class="pixel-btn" style="position: absolute; right: 0; padding: 2px; font-size: 14px; border-radius: 50%; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; border-width: 2px;">i</button>
                </div>
                <div id="shop-scroll">
                <button id="buy-chicken" class="shop-btn" data-title="A new laying friend. (+1 Chicken)">
                    <span>Buy Chicken</span>
                    <span id="cost-chicken">0$</span>
                </button>
                <button id="buy-petting" class="shop-btn" style="display:none;" data-title="Happy Petting: Pet your chickens to make them happy. Each pet reduces the time it takes to lay an egg. (-1.0s Lay Time per pet)">
                    <span>Happy Petting</span>
                    <span id="cost-petting">2$</span>
                </button>
                <button id="buy-basevalue" class="shop-btn" data-title="Enhances the innate quality of all eggs. (x1.5 Base Value)">
                    <span>Egg Value</span>
                    <span id="cost-basevalue">20$</span>
                </button>
                <button id="buy-ramp" class="shop-btn" style="display:none;" data-title="Adds a wooden wedge to bounce falling eggs cleanly onto the underground belt. (Voted the most useless upgrade)">
                    <span>Egg Ramp</span>
                    <span id="cost-ramp">4$</span>
                </button>
                <button id="buy-maxfood" class="shop-btn" style="display:none;" data-title="Expands trough capacity.">
                    <span>Max Food</span>
                    <span id="cost-maxfood">500$</span>
                </button>
                <button id="buy-maxwater" class="shop-btn" style="display:none;" data-title="Expands water basin capacity.">
                    <span>Max Water</span>
                    <span id="cost-maxwater">500$</span>
                </button>
                <button id="buy-washer" class="shop-btn" style="display:none;" data-title="Cleans eggs to dramatically increase their market value. (x2 Value Multiplier)">
                    <span>Egg Washer</span>
                    <span id="cost-washer">1000$</span>
                </button>
                <button id="buy-autofood" class="shop-btn" data-title="Automates food refilling.">
                    <span>Auto-Food</span>
                    <span id="cost-autofood">1000$</span>
                </button>
                <button id="buy-autowater" class="shop-btn" data-title="Automates water refilling.">
                    <span>Auto-Water</span>
                    <span id="cost-autowater">1000$</span>
                </button>
                <button id="buy-autocollect" class="shop-btn" style="display:none;" data-title="Automatically transports meadow eggs below.">
                    <span>Farm Belt</span>
                    <span id="cost-autocollect">25$</span>
                </button>
                <button id="buy-autosell" class="shop-btn" style="display:none;" data-title="Automatically transports stored eggs to market.">
                    <span>Storage Belt</span>
                    <span id="cost-autosell">100$</span>
                </button>

                <button id="buy-refill" class="shop-btn" data-title="Boosts manual interaction power.">
                    <span>Refill</span>
                    <span id="cost-refill">1000$</span>
                </button>
                <button id="buy-premium" class="shop-btn" data-title="A chance to lay high-quality premium eggs. (+5% Chance / x2 Value)">
                    <span>Premium Feed (+5%)</span>
                    <span id="cost-premium">2500$</span>
                </button>
                <button id="buy-golden" class="shop-btn" data-title="A rare chance to lay legendary golden eggs. (+1% Chance / x5 Value)">
                    <span>Golden Egg (+1%)</span>
                    <span id="cost-golden">50000$</span>
                </button>

                <button id="buy-stamper" class="shop-btn" data-title="Certifies egg quality for a higher market price. (x2 Value Multiplier)">
                    <span>Quality Stamp</span>
                    <span id="cost-stamper">15000$</span>
                </button>
                <button id="buy-packager" class="shop-btn" data-title="Boxes eggs in dozens for massive profits. (x2 Value Multiplier)">
                    <span>Egg Packager</span>
                    <span id="cost-packager">100000$</span>
                </button>
                <button id="buy-ribbon" class="shop-btn" data-title="Wraps your eggs in luxurious matte black and gold foil packaging. (x2 Value Multiplier)">
                    <span>Premium Box</span>
                    <span id="cost-ribbon">600000$</span>
                </button>
                <button id="buy-music" class="shop-btn" data-title="Plays upbeat tunes, making chickens move faster. (+15% Speed)">
                    <span>Farm Music</span>
                    <span id="cost-music">500$</span>
                </button>
                <button id="buy-diet" class="shop-btn" data-title="Specialized nutrition that speeds up egg laying. (-1.0s Lay Time)">
                    <span>Pro Diet</span>
                    <span id="cost-diet">1500$</span>
                </button>
                <button id="buy-batch" class="shop-btn" data-title="Eats x2 food and lays twice as many eggs between meals.">
                    <span>Dessert Stomach</span>
                    <span id="cost-batch">30000$</span>
                </button>
                <button id="buy-magnet" class="shop-btn" data-title="Magnetizes your cursor to grab more eggs at a distance. (+5px Radius / +1 Capacity)">
                    <span>Magnet Force</span>
                    <span id="cost-magnet">5$</span>
                </button>
                <button id="buy-rooster" class="shop-btn" data-title="A majestic companion. Helps grow your flock over time. (Spawns 1 chick periodically)">
                    <span>The Rooster</span>
                    <span id="cost-rooster">200$</span>
                </button>
                <button id="buy-growth" class="shop-btn" style="display:none;" data-title="Speeds up the time it takes a chick to mature into a laying hen. (-10s Maturation Time)">
                    <span>Growth Formula</span>
                    <span id="cost-growth">1000$</span>
                </button>
                <button id="buy-tvAd" class="shop-btn" style="display:none;" data-title="As Seen On TV: A commercial about your farm goes viral. Permanently doubles the sale value of all eggs! (x2 Value Multiplier)">
                    <span>As Seen On TV</span>
                    <span id="cost-tvAd">100.000.000$</span>
                </button>
                <button id="buy-retire" class="shop-btn" style="background: #f39c12; color: white; border-color: #e67e22;">
                    <span>Retire</span>
                    <span id="cost-retire">1.000.000.000$</span>
                </button>
                </div><!-- end shop-scroll -->
                
                <!-- STEAM WISHLIST BUTTON -->
                <a id="steam-btn" href="https://store.steampowered.com/app/4563810/The_MachinEGG/" target="_blank" class="pixel-btn" style="display: none; text-align: center; background: #f39c12; color: white; border-color: #e67e22; text-decoration: none; font-size: 10px; margin-top: 10px; flex-shrink: 0; padding: 12px; line-height: 1.5; font-weight: bold; animation: retire-pulse 2s ease-in-out infinite;">WISHLIST ON STEAM!</a>
            </aside>
        </main>
    </div>
    <div id="game-tooltip"></div>
    <div id="ad-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 100000; justify-content: center; align-items: center; flex-direction: column;">
        <h1 id="ad-title" style="color: white; font-family: 'Press Start 2P', monospace; font-size: 48px; text-shadow: 4px 4px 0 #333; margin-bottom: 20px; text-align: center;">3...</h1>
        <p id="ad-subtitle" style="color: #f1c40f; font-family: 'Press Start 2P', monospace; font-size: 16px; text-align: center;">Take a break...</p>
    </div>
    <div id="wipe-confirm-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 100000; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: #5c3a21; border: 6px solid #2b170e; border-radius: 8px; padding: 20px; text-align: center; max-width: 400px; box-shadow: 0px 10px 20px rgba(0,0,0,0.5);">
            <h2 style="color: #e74c3c; font-size: 16px; margin-bottom: 15px; text-shadow: 2px 2px 0 #000; border: none;">WARNING!</h2>
            <p style="color: #f1c40f; font-size: 10px; line-height: 1.5; margin-bottom: 25px; text-shadow: 1px 1px 0 #000;">Are you sure you want to delete ALL progress?<br><br>This cannot be undone!</p>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button id="wipe-cancel" class="pixel-btn" style="background: #95a5a6; color: white;">CANCEL</button>
                <button id="wipe-confirm" class="pixel-btn" style="background: #e74c3c; color: white;">WIPE IT</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
